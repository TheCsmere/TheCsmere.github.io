<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение</title>
    <style>
        body {
            background-color: #1c1c1e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, sans-serif;
            color: #ffffff;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 20px;
            text-align: center;
        }
        .btn {
            background-color: #2b5278;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>Нажмите кнопку, чтобы открыть приложение</h1>
    <a href="https://eternalechoesanket.bbroot.com" class="btn">Открыть приложение</a>
</body>
</html>
